name: sustainability-project

x-backend-shared-env: &backend-shared-env
  APP_ENV: development
  ALLOW_LOCAL_DEV_DATABASE: "true"
  AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
  AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
  AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-10-21}
  AZURE_OPENAI_CHAT_DEPLOYMENT: ${AZURE_OPENAI_CHAT_DEPLOYMENT:-gpt-5.2}
  AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-text-embedding-3-large}

services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: sustainability
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sustainability"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    working_dir: /workspace/apps/api
    command:
      - /bin/sh
      - -lc
      - alembic upgrade head && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    environment:
      <<: *backend-shared-env
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/sustainability
      REDIS_URL: redis://redis:6379/0
      API_PREFIX: ${API_PREFIX:-}
      API_VERSION: ${API_VERSION:-v1}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      ARQ_QUEUE_NAME: ${ARQ_QUEUE_NAME:-arq:queue}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME:-}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_STORAGE_CONTAINER_RAW: ${AZURE_STORAGE_CONTAINER_RAW:-raw-documents}
      AZURE_STORAGE_CONTAINER_PARSED: ${AZURE_STORAGE_CONTAINER_PARSED:-parsed-documents}
      AZURE_STORAGE_CONTAINER_ARTIFACTS: ${AZURE_STORAGE_CONTAINER_ARTIFACTS:-report-artifacts}
      AZURE_STORAGE_USE_LOCAL: ${AZURE_STORAGE_USE_LOCAL:-true}
      LOCAL_BLOB_ROOT: ${LOCAL_BLOB_ROOT:-apps/api/storage}
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:-}
      AZURE_DOCUMENT_INTELLIGENCE_API_KEY: ${AZURE_DOCUMENT_INTELLIGENCE_API_KEY:-}
      AZURE_DOCUMENT_INTELLIGENCE_API_VERSION: ${AZURE_DOCUMENT_INTELLIGENCE_API_VERSION:-2024-11-30}
      AZURE_AI_SEARCH_ENDPOINT: ${AZURE_AI_SEARCH_ENDPOINT:-}
      AZURE_AI_SEARCH_API_KEY: ${AZURE_AI_SEARCH_API_KEY:-}
      AZURE_AI_SEARCH_INDEX_NAME: ${AZURE_AI_SEARCH_INDEX_NAME:-esg-evidence-index}
      AZURE_AI_SEARCH_USE_LOCAL: ${AZURE_AI_SEARCH_USE_LOCAL:-true}
      LOCAL_SEARCH_INDEX_ROOT: ${LOCAL_SEARCH_INDEX_ROOT:-apps/api/storage/search-index}
      LOCAL_CHECKPOINT_ROOT: ${LOCAL_CHECKPOINT_ROOT:-apps/api/storage/checkpoints}
      WORKFLOW_RETRY_MAX_PER_NODE: ${WORKFLOW_RETRY_MAX_PER_NODE:-2}
      WORKFLOW_RETRY_BASE_SECONDS: ${WORKFLOW_RETRY_BASE_SECONDS:-2}
      WORKFLOW_RETRY_MAX_DEFER_SECONDS: ${WORKFLOW_RETRY_MAX_DEFER_SECONDS:-30}
      WORKFLOW_EXECUTE_MAX_STEPS: ${WORKFLOW_EXECUTE_MAX_STEPS:-64}
      AZURE_OPENAI_IMAGE_DEPLOYMENT: ${AZURE_OPENAI_IMAGE_DEPLOYMENT:-}
      AZURE_OPENAI_IMAGE_FALLBACK_DEPLOYMENT: ${AZURE_OPENAI_IMAGE_FALLBACK_DEPLOYMENT:-}
      VERIFIER_MODE: ${VERIFIER_MODE:-heuristic}
      VERIFIER_PASS_THRESHOLD: ${VERIFIER_PASS_THRESHOLD:-0.55}
      VERIFIER_UNSURE_THRESHOLD: ${VERIFIER_UNSURE_THRESHOLD:-0.3}
      REPORT_FACTORY_DEFAULT_BLUEPRINT_VERSION: ${REPORT_FACTORY_DEFAULT_BLUEPRINT_VERSION:-brandable-tr-v1}
      REPORT_FACTORY_DEFAULT_LOCALE: ${REPORT_FACTORY_DEFAULT_LOCALE:-tr-TR}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/health/ready")
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
      target: dev
    working_dir: /workspace/services/worker
    command: ["python", "-m", "arq", "worker.app.WorkerSettings"]
    environment:
      <<: *backend-shared-env
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/sustainability
      REDIS_URL: redis://redis:6379/0
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      QUEUE_NAME: ${QUEUE_NAME:-arq:queue}
      OCR_JOB_MAX_RETRIES: ${OCR_JOB_MAX_RETRIES:-3}
      OCR_RETRY_BASE_SECONDS: ${OCR_RETRY_BASE_SECONDS:-2}
      OCR_RETRY_MAX_DEFER_SECONDS: ${OCR_RETRY_MAX_DEFER_SECONDS:-30}
      INDEX_JOB_MAX_RETRIES: ${INDEX_JOB_MAX_RETRIES:-3}
      INDEX_RETRY_BASE_SECONDS: ${INDEX_RETRY_BASE_SECONDS:-2}
      INDEX_RETRY_MAX_DEFER_SECONDS: ${INDEX_RETRY_MAX_DEFER_SECONDS:-30}
      PACKAGE_JOB_MAX_RETRIES: ${PACKAGE_JOB_MAX_RETRIES:-2}
      PACKAGE_RETRY_BASE_SECONDS: ${PACKAGE_RETRY_BASE_SECONDS:-5}
      PACKAGE_RETRY_MAX_DEFER_SECONDS: ${PACKAGE_RETRY_MAX_DEFER_SECONDS:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - .:/workspace
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import os, redis; redis.from_url(os.environ["REDIS_URL"]).ping()
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    working_dir: /workspace
    command: ["pnpm", "--filter", "web", "dev", "--hostname", "0.0.0.0", "--port", "3000"]
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_DEFAULT_TENANT_ID: ${NEXT_PUBLIC_DEFAULT_TENANT_ID:-}
      NEXT_PUBLIC_DEFAULT_PROJECT_ID: ${NEXT_PUBLIC_DEFAULT_PROJECT_ID:-}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - pnpm_store:/pnpm/store
      - web_root_node_modules:/workspace/node_modules
      - web_app_node_modules:/workspace/apps/web/node_modules
      - web_shared_types_node_modules:/workspace/packages/shared-types/node_modules
      - web_next_cache:/workspace/apps/web/.next
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - 'fetch("http://127.0.0.1:3000").then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))'
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  pnpm_store:
  web_root_node_modules:
  web_app_node_modules:
  web_shared_types_node_modules:
  web_next_cache:
